apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gitops-app-monitor    
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: gitops-app
  namespaceSelector:
    matchNames:
      - default
  endpoints:
  - port: http
    path: /metrics
    interval: 5s