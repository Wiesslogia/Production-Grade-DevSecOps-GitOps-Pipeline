apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Wiesslogia/Production-Grade-DevSecOps-GitOps-Pipeline.git
    targetRevision: main
    path: gitops-chart   
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true