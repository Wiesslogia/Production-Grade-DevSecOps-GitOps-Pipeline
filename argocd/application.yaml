apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Wiesslogia/GitOps-Based-Deployment-System.git
    targetRevision: main
    path: gitops-chart   

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true