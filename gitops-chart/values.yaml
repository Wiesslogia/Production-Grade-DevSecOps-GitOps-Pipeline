deploymentType: rollout   #/deployment

replicaCount: 1

image:
  repository: wiesslogia/gitops:12f0b05921cd28fcbbae91b914e29f441de8fabe
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "gitops-app"


serviceAccount: {}

ServiceMonitor:
  enabled: false

podAnnotations: {}

podLabels: 
  app: gitops-app
  env: dev

podSecurityContext: {}

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: NodePort
  port: 3000
  targetPort: 8080
  nodePort: 30007
  name: http

httpRoute:
  enabled: false.
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  

resources: 
  requests:
    cpu: "10m"
    memory: "50Mi"
  limits:
    cpu: "25m"

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10 
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

volumes: []
 

volumeMounts: []
 
nodeSelector: {}

tolerations: []

affinity: {}
