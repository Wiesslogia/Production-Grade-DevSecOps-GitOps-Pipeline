{{- if eq .Values.deploymentType "rollout"}}

apiVersion: argoproj.io/v1alpha1

kind: Rollout

metadata:        
  name: {{ .Release.Name }}-rollout

spec:                
  replicas: {{ .Values.replicaCount }}    
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: { suration: 30s }

      - setWeight: 50
      - pause: { suration: 30s }

      - setWeight: 100

  selector:          
    matchLabels:  
      app: {{ .Release.Name }}   
  template:          
    metadata:    
      labels:
        app: {{ .Release.Name }}
    spec:          
      containers:
      - name: {{.Chart.Name}}      
        image: {{ .Values.image.repository }}            
        imagePullPolicy: {{.Values.image.pullPolicy}}
        ports:          
        - containerPort: 8080

      resources: {{- toYaml .Values.resources | nindent 10}}


{{- end }}