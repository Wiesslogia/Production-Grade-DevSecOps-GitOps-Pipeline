name: CI Pipeline

on:                 
  push:
    branches:
      - main

env:
  IMAGE_NAME: gitops
  IMAGE_TAG: ${{ github.sha }}


jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan for secrets using Gitleaks
        uses: zricethezav/gitleaks-action@v2

      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v1

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }} -f app/Dockerfile app
      
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }}

      - name: update image in values
        run: sed -i "s| tag: .*|tag: ${{ env.IMAGE_TAG}}|g " helm-chart/values-dev.yaml

      - name: Commit upated values file 
        run: |
          git add helm-chart/values-dev.yaml
          git commit -m "updated dev image tag"
          git push